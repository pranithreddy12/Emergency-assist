name: emergencyai
description: EmergencyAI — AI-powered emergency assistant (Flutter client).
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # State management
  flutter_riverpod: ^2.5.1
  # Routing
  go_router: ^14.2.7
  # Networking
  dio: ^5.7.0
  # Secure token storage
  flutter_secure_storage: ^9.2.2
  # WebSockets for live incidents
  socket_io_client: ^2.0.3+1
  # QR medical card
  qr_flutter: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
