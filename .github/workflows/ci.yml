name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend:
    name: Backend (lint · build · test · e2e)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: emergencyai
          POSTGRES_PASSWORD: emergencyai
          POSTGRES_DB: emergencyai
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U emergencyai"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgresql://emergencyai:emergencyai@localhost:5432/emergencyai?schema=public
      JWT_ACCESS_SECRET: ci_access
      JWT_REFRESH_SECRET: ci_refresh
      FIELD_ENCRYPTION_KEY: ZGV2X29ubHlfMzJfYnl0ZV9rZXlfZG9fbm90X3VzZSE=
    defaults:
      run:
        working-directory: apps/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/backend/package-lock.json
      - run: npm ci
      - run: npx prisma generate
      - run: npx prisma migrate deploy
      - run: npm run build
      - run: npm test
      - run: npm run test:e2e

  sdk:
    name: SDK (typecheck)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/sdk
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - run: npm ci
      - run: npm run typecheck

  admin:
    name: Admin (build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/admin
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/admin/package-lock.json
      - run: npm ci
      - run: npm run build

  images:
    name: Build container images
    runs-on: ubuntu-latest
    needs: [backend, sdk, admin]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: apps/backend
          push: false
          tags: emergencyai-backend:${{ github.sha }}
      - name: Build admin image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/admin/Dockerfile
          push: false
          tags: emergencyai-admin:${{ github.sha }}
