services:
  postgres:
    image: postgres:16-alpine
    container_name: emergencyai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: emergencyai
      POSTGRES_PASSWORD: emergencyai
      POSTGRES_DB: emergencyai
    ports:
      - "5440:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U emergencyai"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: emergencyai-redis
    restart: unless-stopped
    ports:
      - "56379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
