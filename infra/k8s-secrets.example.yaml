# EmergencyAI — cluster secrets TEMPLATE.
#
# Deliberately kept OUTSIDE infra/k8s/ so CI's `kubectl apply -f infra/k8s/`
# can never overwrite real secrets with these placeholders.
#
# Apply ONCE, by hand, with real values:
#   cp infra/k8s-secrets.example.yaml /tmp/secrets.yaml
#   # edit /tmp/secrets.yaml
#   kubectl apply -f /tmp/secrets.yaml && rm /tmp/secrets.yaml
#
# In production prefer Sealed Secrets / External Secrets / a cloud secret store
# over a raw Secret object.
apiVersion: v1
kind: Secret
metadata:
  name: backend-secrets
  namespace: emergencyai
type: Opaque
stringData:
  DATABASE_URL: "postgresql://emergencyai:CHANGE_ME@postgres:5432/emergencyai?schema=public"
  POSTGRES_PASSWORD: "CHANGE_ME"

  # openssl rand -base64 48
  JWT_ACCESS_SECRET: "CHANGE_ME"
  JWT_REFRESH_SECRET: "CHANGE_ME"

  # MUST be a 32-byte base64 key:  openssl rand -base64 32
  # Changing this makes existing encrypted fields unreadable.
  FIELD_ENCRYPTION_KEY: "CHANGE_ME"

  # Comma-separated CORS allowlist, e.g. "https://admin.example.com"
  ALLOWED_ORIGINS: "https://admin.example.com"

  # Optional real-provider keys (leave blank to keep the built-in mocks).
  OPENAI_API_KEY: ""
  GOOGLE_MAPS_API_KEY: ""
  FCM_SERVER_KEY: ""
  TWILIO_ACCOUNT_SID: ""
  TWILIO_AUTH_TOKEN: ""
  TWILIO_FROM: ""
  AWS_S3_BUCKET: ""
  AWS_REGION: ""
  AWS_ACCESS_KEY_ID: ""
  AWS_SECRET_ACCESS_KEY: ""
