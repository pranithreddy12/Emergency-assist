apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: emergencyai
  namespace: emergencyai
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: api.emergencyai.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: backend
                port: { number: 3000 }
    - host: admin.emergencyai.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: admin
                port: { number: 80 }
