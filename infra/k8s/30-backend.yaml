# Runs DB migrations once before the app rolls out.
apiVersion: batch/v1
kind: Job
metadata:
  name: backend-migrate
  namespace: emergencyai
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migrate
          image: emergencyai-backend:latest
          command: ["npx", "prisma", "migrate", "deploy"]
          envFrom:
            - secretRef: { name: backend-secrets }
            - configMapRef: { name: backend-config }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: emergencyai
spec:
  replicas: 2
  selector:
    matchLabels: { app: backend }
  template:
    metadata:
      labels: { app: backend }
    spec:
      containers:
        - name: backend
          image: emergencyai-backend:latest
          # The image CMD also runs migrate; for multi-replica prefer the Job
          # above and set this to just the app:
          command: ["node", "dist/main.js"]
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef: { name: backend-secrets }
            - configMapRef: { name: backend-config }
          readinessProbe:
            httpGet: { path: /api/v1/health, port: 3000 }
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /api/v1/health, port: 3000 }
            initialDelaySeconds: 20
            periodSeconds: 15
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits: { cpu: "500m", memory: "512Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: emergencyai
spec:
  selector: { app: backend }
  ports:
    - port: 3000
      targetPort: 3000
