apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: emergencyai
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels: { app: postgres }
  template:
    metadata:
      labels: { app: postgres }
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: emergencyai
            - name: POSTGRES_DB
              value: emergencyai
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef: { name: backend-secrets, key: POSTGRES_PASSWORD }
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec: { command: ["pg_isready", "-U", "emergencyai"] }
            initialDelaySeconds: 5
            periodSeconds: 5
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: emergencyai
spec:
  selector: { app: postgres }
  ports:
    - port: 5432
      targetPort: 5432
