apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin
  namespace: emergencyai
spec:
  replicas: 1
  selector:
    matchLabels: { app: admin }
  template:
    metadata:
      labels: { app: admin }
    spec:
      containers:
        - name: admin
          image: ghcr.io/pranithreddy12/emergencyai-admin:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet: { path: /, port: 80 }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits: { cpu: "200m", memory: "128Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: admin
  namespace: emergencyai
spec:
  selector: { app: admin }
  ports:
    - port: 80
      targetPort: 80
