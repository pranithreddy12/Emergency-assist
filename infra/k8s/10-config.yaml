# Non-sensitive runtime config only. Secrets live OUTSIDE this directory
# (see infra/k8s-secrets.example.yaml) so that `kubectl apply -f infra/k8s/`
# from CI can never overwrite real cluster secrets.
apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: emergencyai
data:
  NODE_ENV: "production"
  PORT: "3000"
  API_PREFIX: "api/v1"
  REDIS_URL: "redis://redis:6379"
  AI_PROVIDER: "mock"
  MAPS_PROVIDER: "mock"
  STORAGE_PROVIDER: "mock"
  NOTIFY_PROVIDER: "mock"
  SMS_PROVIDER: "mock"
  VOICE_PROVIDER: "mock"
